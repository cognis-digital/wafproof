name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke-test the CLI on the example ruleset
        run: |
          wafproof run --rules examples/rules.json
          wafproof report --rules examples/rules.json --fail-under 0.9
          wafproof corpus --category xss
          printf '<script>alert(1)</script>\nassets/logo.png\n' > /tmp/in.txt
          wafproof scan --rules examples/rules.json --input /tmp/in.txt
          wafproof enrich --package lodash --json
          # active mode must REFUSE without the full authorization gate (exit non-zero)
          if wafproof probe --target http://localhost/x --target-allowlist localhost; then
            echo "ERROR: probe ran without --authorized" && exit 1
          fi
