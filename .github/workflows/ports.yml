name: ports

# Build and test the polyglot ports of wafproof's core check on GitHub runners.
# Go and Rust toolchains are not available in the maintainer's local dev box, so
# these ports are verified here in CI rather than locally.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -v ./...

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Type-check and test
        run: npm test

  shell:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/shell
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck && shellcheck wafproof.sh test_wafproof.sh
      - name: Test
        run: bash test_wafproof.sh
