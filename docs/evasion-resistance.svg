    <text x="42" y="282" fill="#e8eaed">%3Cscript%3E... (encode again)      double-url-encode</text>
    <line x1="460" y1="277" x2="540" y2="277" stroke="#5f6368" stroke-width="2" marker-end="url(#r)"/>
    <rect x="540" y="262" width="190" height="30" rx="5" fill="#2a1414" stroke="#d6534b"/>
    <text x="635" y="282" fill="#f3a6a1" text-anchor="middle" font-weight="700">EVADES ✗</text>

