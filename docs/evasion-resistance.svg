  <text x="380" y="34" fill="#e8eaed" font-size="20" font-weight="700" text-anchor="middle">wafproof evade — the literal-match gap</text>
  <text x="380" y="56" fill="#9aa0a6" font-size="12" text-anchor="middle">why 100% recall on canaries is not 100% safe</text>

  <!-- canary box -->
  <rect x="30" y="92" width="200" height="70" rx="8" fill="#1b2a1b" stroke="#3fae5a" stroke-width="1.5"/>
  <text x="130" y="118" fill="#9be39b" font-size="12" text-anchor="middle">malicious canary</text>
  <text x="130" y="140" fill="#e8eaed" font-size="13" font-family="Consolas, monospace" text-anchor="middle">&lt;script&gt;alert(1)&lt;/script&gt;</text>

  <!-- arrow to detector -->
  <line x1="230" y1="127" x2="300" y2="127" stroke="#5f6368" stroke-width="2" marker-end="url(#a)"/>

  <!-- detector -->
  <rect x="300" y="92" width="160" height="70" rx="8" fill="#1a2230" stroke="#5b8def" stroke-width="1.5"/>
  <text x="380" y="122" fill="#a9c4ff" font-size="12" text-anchor="middle">your detector</text>
  <text x="380" y="142" fill="#e8eaed" font-size="11" font-family="Consolas, monospace" text-anchor="middle">/&lt;\s*script\b/i</text>

  <!-- caught -->
  <line x1="460" y1="127" x2="540" y2="127" stroke="#5f6368" stroke-width="2" marker-end="url(#a)"/>
  <rect x="540" y="100" width="190" height="54" rx="8" fill="#11261a" stroke="#3fae5a" stroke-width="1.5"/>
  <text x="635" y="125" fill="#9be39b" font-size="13" font-weight="700" text-anchor="middle">CAUGHT ✓</text>
  <text x="635" y="143" fill="#9aa0a6" font-size="11" text-anchor="middle">recall counts this as a hit</text>

  <!-- mutation lane -->
  <text x="30" y="210" fill="#f6c453" font-size="13" font-weight="700">semantics-preserving mutations (same payload after the server decodes it)</text>

  <!-- mutated rows -->
  <g font-family="Consolas, monospace" font-size="12">
    <rect x="30" y="226" width="430" height="30" rx="5" fill="#241c14" stroke="#a06a1f"/>
    <text x="42" y="246" fill="#e8eaed">%3Cscript%3Ealert(1)%3C/script%3E   url-encode</text>
    <line x1="460" y1="241" x2="540" y2="241" stroke="#5f6368" stroke-width="2" marker-end="url(#r)"/>
    <rect x="540" y="226" width="190" height="30" rx="5" fill="#2a1414" stroke="#d6534b"/>
