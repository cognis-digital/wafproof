  <text x="30" y="368" fill="#9aa0a6" font-size="12">evasion-resistance = caught mutations / total mutations.  Here the rule scores well on case-toggle</text>
  <text x="30" y="386" fill="#9aa0a6" font-size="12">but 0% on the url-encode class — the exact lever to fix, surfaced before an attacker finds it.</text>
